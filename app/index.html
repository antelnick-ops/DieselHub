function showErr(m){
  var e=document.getElementById('authErr');
  e.textContent=m;
  e.style.display='block';
}
function hideErr(){
  document.getElementById('authErr').style.display='none';
}
function toggleAuthMode(e){
  e.preventDefault();
  isSignUp=!isSignUp;
  hideErr();
  document.getElementById('authBtn').textContent=isSignUp?'Create Account':'Sign In';
  document.getElementById('confirmWrap').style.display=isSignUp?'block':'none';
  document.getElementById('authToggle').innerHTML=isSignUp
    ? 'Already have an account? <a href="#" onclick="toggleAuthMode(event)">Sign In</a>'
    : 'No account? <a href="#" onclick="toggleAuthMode(event)">Sign Up</a>';
}
async function handleAuth(){
  hideErr();
  var email=document.getElementById('authEmail').value.trim();
  var pass=document.getElementById('authPass').value;

  if(!email||!pass) return showErr('Please enter email and password');

  if(isSignUp){
    if(pass!==document.getElementById('authConfirm').value) return showErr('Passwords do not match');
    if(pass.length<6) return showErr('Password must be at least 6 characters');
  }

  var btn=document.getElementById('authBtn');
  btn.textContent=isSignUp?'Creating account...':'Signing in...';
  btn.style.opacity='.6';
  btn.style.pointerEvents='none';

  try{
    var res;
    if(isSignUp){
      res=await sb.auth.signUp({email:email,password:pass});
      if(res.error) throw res.error;

      if(res.data.session){
        onAuth(res.data.session.user,true);
        return;
      }

      if(res.data.user&&!res.data.session){
        btn.textContent='Create Account';
        btn.style.opacity='1';
        btn.style.pointerEvents='auto';
        showErr('Check your email to confirm your account, then sign in.');
        isSignUp=false;
        document.getElementById('authBtn').textContent='Sign In';
        document.getElementById('confirmWrap').style.display='none';
        document.getElementById('authToggle').innerHTML='No account? <a href="#" onclick="toggleAuthMode(event)">Sign Up</a>';
        return;
      }
    }else{
      res=await sb.auth.signInWithPassword({email:email,password:pass});
      if(res.error) throw res.error;
      onAuth(res.data.session.user,false);
    }
  }catch(err){
    showErr(err.message||'Authentication failed');
    btn.textContent=isSignUp?'Create Account':'Sign In';
    btn.style.opacity='1';
    btn.style.pointerEvents='auto';
  }
}
async function oAuth(p){
  hideErr();
  var r=await sb.auth.signInWithOAuth({provider:p,options:{redirectTo:location.origin+'/app/'}});
  if(r.error) showErr(r.error.message);
}

function vehicleObjIsComplete(v){
  return !!(v&&v.year&&v.make&&v.model&&v.engine);
}
function getStoredVehicle(){
  try{
    var raw=localStorage.getItem('bsd_vehicle');
    if(!raw) return null;
    var v=JSON.parse(raw);
    return vehicleObjIsComplete(v)?v:null;
  }catch(e){
    return null;
  }
}
async function saveVehicleToAccount(){
  localStorage.setItem('bsd_vehicle',JSON.stringify({year:V.year,make:V.make,model:V.model,engine:V.engine}));
  if(!ACTIVE_USER) return;
  try{
    var md=ACTIVE_USER.user_metadata||{};
    var updated=await sb.auth.updateUser({data:Object.assign({},md,{vehicle:{year:V.year,make:V.make,model:V.model,engine:V.engine}})});
    if(updated&&updated.data&&updated.data.user) ACTIVE_USER=updated.data.user;
  }catch(e){}
}
async function clearVehicleFromAccount(){
  localStorage.removeItem('bsd_vehicle');
  if(!ACTIVE_USER) return;
  try{
    var md=Object.assign({},ACTIVE_USER.user_metadata||{});
    delete md.vehicle;
    var updated=await sb.auth.updateUser({data:md});
    if(updated&&updated.data&&updated.data.user) ACTIVE_USER=updated.data.user;
  }catch(e){}
}
async function onAuth(user){
  ACTIVE_USER=user||null;
  var email=user.email||'';
  var name=email.split('@')[0].split('.').map(function(w){return w.charAt(0).toUpperCase()+w.slice(1);}).join(' ');
  var initials=name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();

  var pAv = document.getElementById('pAv');
  if(pAv) pAv.textContent=initials||'BS';
  var pName = document.getElementById('pName');
  if(pName) pName.textContent=name||'BlackStack User';
  var pEmail = document.getElementById('pEmail');
  if(pEmail) pEmail.textContent=email;

  var acctVehicle=(user.user_metadata&&user.user_metadata.vehicle)?user.user_metadata.vehicle:null;
  var saved=vehicleObjIsComplete(acctVehicle)?acctVehicle:getStoredVehicle();

  if(vehicleObjIsComplete(saved)){
    V.year=saved.year;
    V.make=saved.make;
    V.model=saved.model;
    V.engine=saved.engine;
    applyVehicle();
    go('mkt');
    showNav();
    if(!vehicleObjIsComplete(acctVehicle)) await saveVehicleToAccount();
    loadProducts();
    return;
  }

  go('veh');
  hideNav();
}

    Object.values(mk).forEach(function(m){
      m.y.filter(function(y){return y>=s&&y<=e;}).forEach(function(y){yrs.add(y);});

  var el=document.getElementById('yearP');

function escapeHtml(v){
  return String(v||'').replace(/[&<>"']/g,function(m){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}
function cleanImageUrl(v){
  var s=(v||'').replace(/^"+|"+$/g,'').trim();
  if(!s||s==='NA'||s==='null') return '';
  return s;
}
function getVehicleAliases(){
  if(!V.year||!V.make||!V.model||!V.engine) return [];
  var aliases=[String(V.year),V.make,V.model,V.engine];
  var eng=V.engine.toLowerCase();
  if(eng.indexOf('7.3')>-1) aliases=aliases.concat(['7.3','power stroke','powerstroke','7.3l']);
  if(eng.indexOf('6.0')>-1) aliases=aliases.concat(['6.0','power stroke','powerstroke','6.0l']);
  if(eng.indexOf('6.4')>-1) aliases=aliases.concat(['6.4','power stroke','powerstroke','6.4l']);
  if(eng.indexOf('6.7')>-1&&V.make==='Ford') aliases=aliases.concat(['6.7','power stroke','powerstroke','6.7l']);
  if(V.make==='Ford'&&V.model==='F-250') aliases=aliases.concat(['f250','f-250','super duty','f series']);
  if(V.make==='Ford'&&V.model==='F-350') aliases=aliases.concat(['f350','f-350','super duty','f series']);
  return aliases.map(function(x){return String(x).toLowerCase();});
}
function scoreProductForVehicle(p){
  if(!V.year||!V.make||!V.model||!V.engine) return 0;
  var text=[p.product_name,p.description,p.fitment_text,p.category,p.brand,p.sku].filter(Boolean).join(' ').toLowerCase();
  var score=0;
  var aliases=getVehicleAliases();
  aliases.forEach(function(a){if(a&&text.indexOf(a)>-1) score+=2;});
  if(text.indexOf(String(V.year))>-1) score+=3;
  if(text.indexOf(V.make.toLowerCase())>-1) score+=4;
  if(text.indexOf(V.model.toLowerCase())>-1||text.indexOf(V.model.toLowerCase().replace('-',''))>-1) score+=5;
  var eng=V.engine.toLowerCase();
  if(text.indexOf(eng)>-1) score+=7;
  if((eng.indexOf('power stroke')>-1||eng.indexOf('powerstroke')>-1) && (text.indexOf('power stroke')>-1||text.indexOf('powerstroke')>-1)) score+=5;
  if(eng.indexOf('7.3')>-1&&text.indexOf('7.3')>-1) score+=8;
  return score;
}
function vehicleMatchLabel(score){
  if(score>=18) return 'Strong match';
  if(score>=10) return 'Likely fit';
  if(score>=5) return 'Possible fit';
  return '';
}
function openProduct(id){
  var p=PRODUCT_MAP[id];
  if(!p) return;
  var img=cleanImageUrl(p.image_url);
  var emoji=getCatEmoji(p.category);
  var score=scoreProductForVehicle(p);
  var label=vehicleMatchLabel(score);
  var pd=document.getElementById('pDetail');

  document.getElementById('pdImg').innerHTML=img?'<img src="'+escapeHtml(img)+'" alt="'+escapeHtml(p.product_name)+'">':emoji;
  document.getElementById('pdBrand').textContent=p.brand||'';
  document.getElementById('pdTitle').textContent=p.product_name||'Product';
  document.getElementById('pdPrice').textContent='$'+((parseFloat(p.price)||0).toLocaleString());

  var meta=[];
  if(p.sku) meta.push('<div class="pdet-tag">SKU: '+escapeHtml(p.sku)+'</div>');
  if(p.category) meta.push('<div class="pdet-tag">'+escapeHtml(p.category)+'</div>');
  if(label) meta.push('<div class="pdet-tag">'+escapeHtml(label)+'</div>');
  if(p.brand) meta.push('<div class="pdet-tag">'+escapeHtml(p.brand)+'</div>');
  document.getElementById('pdMeta').innerHTML=meta.join('');
  document.getElementById('pdDesc').textContent=(p.description&&p.description.trim())?p.description:'No description available for this product yet.';
  document.getElementById('pdAddBtn').onclick=function(){
    addToCart(p.id,p.product_name,p.brand||'',parseFloat(p.price)||0,emoji);
  };
  pd.classList.add('op');
}
function closeProduct(){
  document.getElementById('pDetail').classList.remove('op');
}

function saveCart(){
  localStorage.setItem('bsd_cart',JSON.stringify(cart));
}
function addToCart(id,name,brand,price,emoji){
  var existing=cart.find(function(c){return c.id===id;});
  if(existing) existing.qty++;
  else cart.push({id:id,name:name,brand:brand,price:price,emoji:emoji,qty:1});
  saveCart();
  renderCart();
  document.getElementById('cD').classList.add('op');
}
function removeFromCart(id){
  var idx=cart.findIndex(function(c){return c.id===id;});
  if(idx>-1){
    if(cart[idx].qty>1) cart[idx].qty--;
    else cart.splice(idx,1);
  }
  saveCart();
  renderCart();
}
function renderCart(){
  var el=document.getElementById('cartItems');
  var badge=document.querySelector('.cbdg');
  var totalEl=document.getElementById('cartTotal');
  var countEl=document.getElementById('cartCount');
  if(!el || !badge || !totalEl || !countEl) return;

  var total=0,count=0;

  cart.forEach(function(c){
    total+=c.price*c.qty;
    count+=c.qty;
  });

  badge.textContent=count;
  countEl.textContent=count>0?'('+count+' items)':'';

  if(cart.length===0){
    el.innerHTML='<div class="cd-e">Your cart is empty</div>';
    totalEl.textContent='$0';
    return;
  }

  var html='<div class="cd-items">';
  cart.forEach(function(c){
    html+='<div class="ci"><div class="ci-img">'+c.emoji+'</div><div class="ci-info"><h4>'+escapeHtml(c.name)+'</h4><p>'+escapeHtml(c.brand)+(c.qty>1?' × '+c.qty:'')+'</p></div><div class="ci-right"><div class="ci-price">$'+((c.price*c.qty).toLocaleString())+'</div><div class="ci-rm" onclick="removeFromCart(\''+c.id+'\')"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg></div></div></div>';
  });
  html+='</div>';
  el.innerHTML=html;
  totalEl.textContent='$'+(total.toLocaleString());
}
async function doCheckout(){
  if(cart.length===0) return;

  var btn=document.getElementById('checkoutBtn');
  btn.textContent='Redirecting to Stripe...';
  btn.style.opacity='.6';
  btn.style.pointerEvents='none';

  try{
    var user=null;
    try{
      var s=await sb.auth.getSession();
      user=s.data.session?.user;
    }catch(e){}

    var vehicle=V.year?V.year+' '+V.make+' '+V.model+' — '+V.engine:'';
    var res=await fetch('/api/create-checkout',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        items:cart.map(function(c){return{id:c.id,name:c.name,brand:c.brand,price:c.price,qty:c.qty};}),
        customer_email:user?user.email:null,
        vehicle:vehicle
      })
    });
    var data=await res.json();
    if(data.url) window.location.href=data.url;
    else throw new Error(data.error||'Could not create checkout session');
  }catch(err){
    alert('Checkout error: '+err.message+'\n\nPlease try again.');
    btn.textContent='Checkout';
    btn.style.opacity='1';
    btn.style.pointerEvents='auto';
  }
}

var catEmoji={injectors:'💉',turbos:'🌀','head studs':'🔩',egr:'🔧','fuel system':'⛽',engine:'🔧',exhaust:'💨',tuning:'📟',intake:'🌬️',gauges:'📊',cooling:'❄️'};
function getCatEmoji(cat){
  return catEmoji[(cat||'').toLowerCase()]||'🔧';
}

async function loadProducts(){
  var grid=document.getElementById('pgrid');
  if(!grid) return;
  var res=await sb.from('products').select('*').eq('status','active').order('created_at',{ascending:false});

  if(res.error||!res.data||res.data.length===0){
    grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--t3);font-size:14px">No products available yet</div>';
    return;
  }

  ALL_PRODUCTS=res.data.map(function(p){
    p.__img=cleanImageUrl(p.image_url);
    p.__score=scoreProductForVehicle(p);
    p.__fit=p.__score>=8;
    PRODUCT_MAP[p.id]=p;
    return p;
  });

  var vehicleMatched=ALL_PRODUCTS.filter(function(p){return p.__fit;});
  MATCHED_PRODUCTS=vehicleMatched;

  var products=(V.engine&&vehicleMatched.length>0)?vehicleMatched.slice():ALL_PRODUCTS.slice();

  products.sort(function(a,b){
    if((b.__fit?1:0)!==(a.__fit?1:0)) return (b.__fit?1:0)-(a.__fit?1:0);
    if((b.__img?1:0)!==(a.__img?1:0)) return (b.__img?1:0)-(a.__img?1:0);
    if((b.__score||0)!==(a.__score||0)) return (b.__score||0)-(a.__score||0);
    return 0;
  });

  var cats=new Set(),brands=new Set();
  products.forEach(function(p){
    if(p.category) cats.add(p.category);
    if(p.brand) brands.add(p.brand);
  });

  var tabHtml='<div class="ct on">All</div>';
  Array.from(cats).sort().forEach(function(c){tabHtml+='<div class="ct">'+c+'</div>';});
  var catTabsEl = document.getElementById('catTabs');
  if(catTabsEl) catTabsEl.innerHTML=tabHtml;
  document.querySelectorAll('.ct').forEach(function(c){
    c.onclick=function(){
      document.querySelectorAll('.ct').forEach(function(x){x.classList.remove('on');});
      c.classList.add('on');
      filterProducts();
    };
  });

  var brandHtml='<option>Brand: All</option>';
  Array.from(brands).sort().forEach(function(b){brandHtml+='<option>'+b+'</option>';});
  var brandDdEl = document.getElementById('brandDd');
  if(brandDdEl) brandDdEl.innerHTML=brandHtml;

  var countHtml='';
  if(V.engine&&vehicleMatched.length>0){
    countHtml='<div class="pc-fit-count">Showing '+vehicleMatched.length.toLocaleString()+' likely matches for your '+escapeHtml(V.year+' '+V.make+' '+V.model)+' • '+escapeHtml(V.engine)+'</div>';
  }else if(V.engine){
    countHtml='<div class="pc-fit-count">Showing all active products. No strong vehicle matches were found yet for your '+escapeHtml(V.year+' '+V.make+' '+V.model)+' • '+escapeHtml(V.engine)+'.</div>';
  }

  var html=countHtml;
  products.forEach(function(p){
    var cat=(p.category||'').toLowerCase();
    var stg=p.stage||'';
    var brand=(p.brand||'').toLowerCase();
    var price=parseFloat(p.price)||0;
    var emoji=getCatEmoji(p.category);
    var stgClass=stg?'s'+stg:'';
    var stgLabel=stg?'STG '+stg:'';
    var img=p.__img;
    var fits=!!p.__fit;

    html+='<div class="pc g" data-id="'+p.id+'" data-cat="'+cat+'" data-stage="'+stg+'" data-brand="'+brand+'" data-price="'+Math.round(price)+'" data-fit="'+(fits?'1':'0')+'" onclick="openProduct(\''+p.id+'\')">';
    html+='<div class="pc-img">';
    if(img) html+='<img src="'+escapeHtml(img)+'" alt="'+escapeHtml(p.product_name||'Product')+'" loading="lazy">';
    else html+=emoji;
    if(V.engine&&fits) html+='<div class="pc-fit">✓ Fits Your Rig</div>';
    if(stg) html+='<div class="pc-stg '+stgClass+'">'+stgLabel+'</div>';
    html+='</div>';
    html+='<div class="pc-bd">';
    if(p.brand) html+='<div class="pc-br">'+escapeHtml(p.brand)+'</div>';
    html+='<h4>'+escapeHtml(p.product_name)+'</h4>';
    html+='<div class="pc-bt"><div class="pc-pr mono">$'+price.toLocaleString()+'</div>';
    html+='<button class="ab" onclick="event.stopPropagation();addToCart(\''+p.id+'\',\''+String(p.product_name||'').replace(/'/g,"\\'")+'\',\''+String(p.brand||'').replace(/'/g,"\\'")+'\','+price+',\''+emoji+'\')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>';
    html+='</div></div></div>';
  });

  html+='<div class="pc g noresult" style="display:none;grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--t3);font-size:14px" id="noResults">No parts match your filters</div>';
  grid.innerHTML=html;

  document.querySelectorAll('.stg').forEach(function(b){
    b.onclick=function(){
      b.classList.toggle('on');
      filterProducts();
    };
  });
  document.querySelectorAll('.dd').forEach(function(d){
    d.onchange=function(){filterProducts();};
  });
  var searchInput = document.querySelector('.sbox input');
  if(searchInput) searchInput.addEventListener('input',function(){filterProducts();});
}

function filterProducts(){
  var activeCat=document.querySelector('.ct.on');
  var catFilter=activeCat?activeCat.textContent.trim().toLowerCase():'all';
  var activeStages=[];
  document.querySelectorAll('.stg.on').forEach(function(s){
    activeStages.push(s.textContent.trim().replace('Stage ',''));
  });

  var dds=document.querySelectorAll('.dd');
  var priceFilter=dds[0].value;
  var brandFilter=dds[1].value.toLowerCase();
  var sortFilter=dds[2].value;
  var searchQ=document.querySelector('.sbox input').value.trim().toLowerCase();
  var cards=document.querySelectorAll('#pgrid .pc:not(.noresult)');
  var visible=0;

  cards.forEach(function(card){
    var show=true;
    var cardCat=card.dataset.cat;
    var cardStage=card.dataset.stage;
    var cardBrand=card.dataset.brand;
    var cardPrice=parseInt(card.dataset.price||'0',10);
    var cardName=card.querySelector('h4').textContent.toLowerCase();

    if(catFilter!=='all'&&cardCat!==catFilter) show=false;
    if(activeStages.length>0&&activeStages.indexOf(cardStage)===-1) show=false;
    if(brandFilter&&brandFilter!=='brand: all'&&cardBrand!==brandFilter.replace('brand: ','')) show=false;
    if(priceFilter==='Under $100'&&cardPrice>=100) show=false;
    if(priceFilter==='$100–$500'&&(cardPrice<100||cardPrice>500)) show=false;
    if(priceFilter==='$500–$1K'&&(cardPrice<500||cardPrice>1000)) show=false;
    if(priceFilter==='$1K+'&&cardPrice<1000) show=false;
    if(searchQ&&cardName.indexOf(searchQ)===-1&&cardBrand.indexOf(searchQ)===-1&&cardCat.indexOf(searchQ)===-1) show=false;

    card.style.display=show?'':'none';
    if(show) visible++;
  });

  var noRes=document.getElementById('noResults');
  if(noRes) noRes.style.display=visible===0?'block':'none';

  if(sortFilter==='Low → High'||sortFilter==='High → Low'){
    var grid=document.getElementById('pgrid');
    var arr=Array.from(cards).filter(function(c){return c.style.display!=='none';});
    arr.sort(function(a,b){
      var pa=parseInt(a.dataset.price||'0',10),pb=parseInt(b.dataset.price||'0',10);
      return sortFilter==='Low → High'?pa-pb:pb-pa;
    });
    arr.forEach(function(c){grid.appendChild(c);});
    if(noRes) grid.appendChild(noRes);
  }
}

renderCart();
uProg(1);
initYrs();
checkSession();
loadProducts();

if(window.location.search.indexOf('checkout=success')>-1){
  cart=[];
  saveCart();
  renderCart();
  setTimeout(function(){
    alert('Payment successful! Your order is confirmed. You\'ll receive a confirmation email shortly.');
  },500);
  history.replaceState(null,'','/app/');
}else if(window.location.search.indexOf('checkout=cancelled')>-1){
  setTimeout(function(){
    alert('Checkout was cancelled. Your cart is still saved.');
  },500);
  history.replaceState(null,'','/app/');
}

document.getElementById('authPass').addEventListener('keydown',function(e){
  if(e.key==='Enter') handleAuth();
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeProduct();
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/app/sw.js').catch(function(){});
}
</script>
